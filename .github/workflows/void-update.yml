name: "Void Flash Sync"
on:
  workflow_dispatch:
    inputs:
      voidBuildId: { required: true }
      voidShortId: { required: true }
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v3

      - name: "Void Terminal Bridge"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          VOID_WEBHOOK_SECRET: ${{ secrets.VOID_WEBHOOK_SECRET }}
        run: |
          compute_signature() {
            echo -n "$1" | openssl dgst -sha256 -hmac "$VOID_WEBHOOK_SECRET" | sed 's/^.* //'
          }

          send_log() {
            local type=$1
            local message=$2
            local payload="{\"shortId\": \"${{ github.event.inputs.voidShortId }}\", \"message\": \"$message\", \"type\": \"$type\"}"
            local signature=$(compute_signature "$payload")
            curl -s -m 2 -X POST https://nontheosophic-katherin-clumsiest.ngrok-free.dev/projects/webhook/logs \
              -H "Content-Type: application/json" \
              -H "X-Void-Signature: sha256=$signature" \
              -H "ngrok-skip-browser-warning: true" \
              -d "$payload" || true
          }

          v_log() {
            while IFS= read -r line; do
              echo "[$type] $line"
              CLEAN=$(echo "$line" | tr -d '"' | tr -d "\\")
              send_log "$type" "$CLEAN"
            done
          }

          type=github
          echo "⚡️ Iniciando Flash Sync (OTA)..." | v_log
          
          type=github
          echo "📦 Preparando bundle de JavaScript..." | v_log
          npm install --legacy-peer-deps 2>&1 | v_log
          
          type=expo
          echo "🚀 Publicando actualización en Expo..." | v_log
          EXPO_TOKEN=${{ secrets.EXPO_TOKEN }} npx eas-cli update --branch preview --message "VoidSync" --non-interactive 2>&1 | v_log

      - name: "Finish"
        if: always()
        env:
          VOID_WEBHOOK_SECRET: ${{ secrets.VOID_WEBHOOK_SECRET }}
        run: |
          compute_signature() {
            echo -n "$1" | openssl dgst -sha256 -hmac "$VOID_WEBHOOK_SECRET" | sed 's/^.* //'
          }
          PAYLOAD="{\"projectId\": \"09e1e899-dc3d-456c-b3ab-63641c98ed07\", \"voidBuildId\": \"${{ github.event.inputs.voidBuildId }}\", \"status\": \"${{ job.status }}\", \"downloadUrl\": \"OTA\"}"
          SIGNATURE=$(compute_signature "$PAYLOAD")
          curl -s -X POST https://nontheosophic-katherin-clumsiest.ngrok-free.dev/projects/webhook/build-finished \
          -H "Content-Type: application/json" \
          -H "X-Void-Signature: sha256=$SIGNATURE" \
          -H "ngrok-skip-browser-warning: true" \
          -d "$PAYLOAD"
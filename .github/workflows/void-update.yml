name: "Void Flash Sync"
on:
  workflow_dispatch:
    inputs:
      voidBuildId:
        description: "ID de la base de datos"
        required: true
      voidShortId:
        description: "ID corto"
        required: true
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v3
      - name: "Setup Node"
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: "Setup Expo"
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: "Install"
        run: npm install --legacy-peer-deps
      - name: "Update"
        run: npx eas-cli update --branch preview --message "VoidFlashSync" --non-interactive
      - name: "Notify"
        run: |
          curl -X POST https://nontheosophic-katherin-clumsiest.ngrok-free.dev/projects/webhook/build-finished -H "Content-Type: application/json" \
          -d '{"projectId": "09e1e899-dc3d-456c-b3ab-63641c98ed07", "voidBuildId": "${{ github.event.inputs.voidBuildId }}", "status": "UPDATED", "downloadUrl": "OTA_UPDATE"}'
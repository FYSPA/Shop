name: "Void Flash Sync"
on:
  workflow_dispatch:
    inputs:
      voidBuildId: { required: true }
      voidShortId: { required: true }
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v3

      - name: "Void Terminal Bridge"
        run: |
          # Creamos una función que envía cada línea a tu API
          function v_log() {
            while IFS= read -r line; do
              echo "$line" # Esto lo mantiene en la consola de GitHub
              curl -s -X POST https://nontheosophic-katherin-clumsiest.ngrok-free.dev/projects/webhook/logs \
                -H "Content-Type: application/json" \
                -H "ngrok-skip-browser-warning: true" \
                -d "{\"shortId\": \"${{ github.event.inputs.voidShortId }}\", \"message\": \"$line\"}"
            done
          }

          # Ahora "pipemaos" los comandos reales hacia nuestra función
          echo "🚀 Iniciando Flash Sync..." | v_log
          
          echo "📦 Instalando dependencias..." | v_log
          npm install --legacy-peer-deps 2>&1 | v_log
          
          echo "⚡️ Publicando en Expo..." | v_log
          npx eas-cli update --branch preview --message "VoidSync" --non-interactive 2>&1 | v_log

      - name: "Finish"
        run: |
          curl -s -X POST https://nontheosophic-katherin-clumsiest.ngrok-free.dev/projects/webhook/build-finished \
          -H "Content-Type: application/json" \
          -H "ngrok-skip-browser-warning: true" \
          -d "{\"projectId\": \"09e1e899-dc3d-456c-b3ab-63641c98ed07\", \"voidBuildId\": \"${{ github.event.inputs.voidBuildId }}\", \"status\": \"UPDATED\", \"downloadUrl\": \"OTA\"}"

name: Void Build APK
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v3
      - name: 🟢 Setup Node
        uses: actions/setup-node@v3
      - name: 🚀 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: 📦 Install
        run: npm install
      - name: 🏗 Build APK
        run: npx eas-build -p android --profile preview --local --non-interactive --output=app-release.apk

name: "Void Build APK"
on:
  workflow_dispatch:
    inputs:
      voidBuildId: { required: true }
      voidShortId: { required: true }
jobs:
  build:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - name: "Checkout"
        uses: actions/checkout@v3

      - name: "Void Terminal Bridge"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # Función de log ultra-robusta
          function v_log() {
            local type=$1
            while IFS= read -r line; do
              echo "[$type] $line"
              # Limpiamos comillas y barras usando sed (más seguro que tr)
              CLEAN=$(echo "$line" | sed 's/[\"/]//g')
              # Enviamos el curl pero con un timeout de 2 segundos y que no falle el script (|| true)
              curl -s -m 2 -X POST https://nontheosophic-katherin-clumsiest.ngrok-free.dev/projects/webhook/logs \
                -H "Content-Type: application/json" \
                -H "ngrok-skip-browser-warning: true" \
                -d "{\"shortId\": \"${{ github.event.inputs.voidShortId }}\", \"message\": \"$CLEAN\", \"type\": \"$type\"}" || true
            done
          }

          echo "🚀 Iniciando infraestructura Void..." | v_log github
          
          echo "📦 Instalando dependencias..." | v_log github
          npm install --legacy-peer-deps 2>&1 | v_log github
          
          echo "🏗 Iniciando compilación Gradle (Android)..." | v_log expo
          CI=1 EXPO_TOKEN=${{ secrets.EXPO_TOKEN }} npx eas-cli build -p android --profile preview --local --non-interactive --output=app-release.apk 2>&1 | v_log expo

      - name: "Release"
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          files: app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Finish"
        if: always()
        run: |
          curl -s -X POST https://nontheosophic-katherin-clumsiest.ngrok-free.dev/projects/webhook/build-finished \
          -H "Content-Type: application/json" \
          -H "ngrok-skip-browser-warning: true" \
          -d "{\"projectId\": \"09e1e899-dc3d-456c-b3ab-63641c98ed07\", \"voidBuildId\": \"${{ github.event.inputs.voidBuildId }}\", \"status\": \"${{ job.status }}\", \"downloadUrl\": \"https://github.com/FYSPA/Shop/releases/download/build-${{ github.run_number }}/app-release.apk\"}"

name: Void Build APK
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v3

      - name: 🟢 Setup Node 20
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: ☕️ Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🚀 Setup Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🏗 Build APK (Local Mode)
        run: npx eas-cli build -p android --profile preview --local --non-interactive --output=app-release.apk

      - name: 📢 Notify Void API
        run: |
          curl -X POST https://nontheosophic-katherin-clumsiest.ngrok-free.dev \
          -H "Content-Type: application/json" \
          -d "{\"projectId\": \"b3aff62d-9ba0-4746-89a1-8a6a268decb6\", \"status\": \"SUCCESS\", \"downloadUrl\": \"URL_DEL_ARTEFACTO\"}"
